<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uki oki 宠物鲜食</title>
    <link rel="icon" type="image/png" href="image/title-icon.png">
    <link rel="apple-touch-icon" href="image/header-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title-row">
                <img src="image/header-icon.png" alt="icon" class="header-icon">
                <h1>uki oki 热量计算器</h1>
            </div>
        </div>

        <div class="progress-bar" id="progressBar"></div>

        <div class="content">
            <!-- 步骤 0: 宠物类型 -->
            <div class="step active" id="step-0">
                <div class="step-title">选择宠物类型</div>
                <div class="step-desc">请选择您要计算的宠物种类</div>
                <div class="pet-options">
                    <div class="pet-card" data-pet="dog">
                        <div class="icon">🐶</div>
                        <div class="label">犬</div>
                    </div>
                    <div class="pet-card" data-pet="cat">
                        <div class="icon">🐱</div>
                        <div class="label">猫</div>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-next" id="btnNext0" disabled data-action="next">下一步</button>
                </div>
            </div>

            <!-- 步骤 1: 体重 -->
            <div class="step" id="step-1">
                <div class="step-title">输入体重</div>
                <div class="step-desc">请输入您家宝贝的体重</div>
                <div class="weight-input-wrapper">
                    <input type="number" class="weight-input" id="weightInput" placeholder="0.0" min="0.1" step="0.1">
                    <span class="weight-unit">kg</span>
                </div>
                <div class="btn-row">
                    <button class="btn btn-back" data-action="prev">上一步</button>
                    <button class="btn btn-next" id="btnNext1" disabled data-action="next">下一步</button>
                </div>
            </div>

            <!-- 步骤 2: 性别 -->
            <div class="step" id="step-2">
                <div class="step-title">性别</div>
                <div class="step-desc">请选择宝贝的性别</div>
                <div class="options">
                    <div class="option-btn" data-step="2" data-key="gender" data-value="male">
                        <span class="dot"></span> 💪 男宝
                    </div>
                    <div class="option-btn" data-step="2" data-key="gender" data-value="female">
                        <span class="dot"></span> 🎀 女宝
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-back" data-action="prev">上一步</button>
                    <button class="btn btn-next" id="btnNext2" disabled data-action="next">下一步</button>
                </div>
            </div>

            <!-- 步骤 3: 绝育状态 -->
            <div class="step" id="step-3">
                <div class="step-title">绝育状态</div>
                <div class="step-desc">宝贝是否已绝育？</div>
                <div class="options">
                    <div class="option-btn" data-step="3" data-key="neutered" data-value="yes">
                        <span class="dot"></span> 已绝育
                    </div>
                    <div class="option-btn" data-step="3" data-key="neutered" data-value="no">
                        <span class="dot"></span> 未绝育
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-back" data-action="prev">上一步</button>
                    <button class="btn btn-next" id="btnNext3" disabled data-action="next">下一步</button>
                </div>
            </div>

            <!-- 步骤 4-8: 由 JS 动态生成 -->

            <!-- 步骤 9: 结果页 -->
            <div class="step" id="step-9">
                <div class="result-card">
                    <div class="result-icon" id="resultIcon"></div>
                    <div class="result-label">每日建议摄入热量 (MER)</div>
                    <div class="result-value" id="resultValue"></div>
                    <div class="result-unit">千卡 / 天</div>
                    <div class="result-details">
                        <div class="detail-row">
                            <span class="detail-label">宠物类型</span>
                            <span class="detail-value" id="detailPet"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">体重</span>
                            <span class="detail-value" id="detailWeight"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">静息能量需求 (RER)</span>
                            <span class="detail-value" id="detailRER"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">MER系数</span>
                            <span class="detail-value" id="detailCoeff"></span>
                        </div>
                    </div>
                    <details class="result-note">
                        <summary>📐 查看推导过程</summary>
                        <div class="result-note-wrapper">
                            <div class="result-note-content" id="resultNoteContent"></div>
                        </div>
                    </details>
                    <div class="btn-wrapper btn-glow" id="feedingBtnWrapper">
                        <button class="btn btn-restart" id="btnFeedingCalc">🍖 查看喂食量</button>
                    </div>
                    <p class="result-disclaimer">* 仅提供每日热量参考，具体摄入量按个体情况调整。</p>
                </div>
            </div>

            <!-- 步骤 10: 喂食量页 -->
            <div class="step" id="step-10">
                <div class="feeding-page">
                    <div class="feeding-mer-summary">
                        <div class="feeding-icon" id="feedingIcon"></div>
                        <div class="feeding-mer-text">您的爱宠每日大致需要摄入</div>
                        <div class="feeding-mer-value"><span id="feedingMerValue"></span> 千卡</div>
                    </div>

                    <div class="custom-calorie-section">
                        <div class="section-title">自定义产品热量计算</div>
                        <div class="brand-note">* 以 MER × 0.95 热量缺口估算</div>
                        <div class="custom-calorie-wrapper">
                            <input type="number" class="custom-calorie-input" id="customCalorieInput" placeholder="输入每份能量" min="1" step="1">
                            <span class="custom-calorie-unit">千卡/份</span>
                        </div>
                        <div class="custom-result" id="customResult"></div>
                    </div>

                    <div class="brand-suggestions">
                        <div class="brand-title">uki oki 品牌鲜食喂食建议</div>
                        <div class="suggestion-table">
                            <div class="suggestion-header">
                                <span class="col-flavor">口味配方</span>
                                <span class="col-kcal">单包能量</span>
                                <span class="col-grams">单包克数</span>
                                <span class="col-packs">建议包数</span>
                            </div>
                            <div class="suggestion-body" id="suggestionBody"></div>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button class="btn btn-back-result" id="btnBackResult">返回结果</button>
                        <button class="btn btn-restart" data-action="restart">🔄 重新计算</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
